name: CI - Development

on:
  pull_request:
    branches:
      - develop

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Run Linter
        run: npm run lint

      - name: Build Project
        run: npm run build
